[env:waveshare_21_round]
platform = espressif32@^6.9.0
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor and upload settings
monitor_speed = 115200
upload_speed = 921600

; Build flags for Waveshare ESP32-S3-Touch-LCD with CH343 USB chip
build_flags = 
    -DCORE_DEBUG_LEVEL=0
    -DLOG_LOCAL_LEVEL=0
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_USE_DRAW_SW_ASM=0
    -DLV_USE_NATIVE_HELIUM_ASM=0
    -DLV_USE_ARM2D=0
    ; Board has CH343 USB chip on UART0 - Serial uses UART0 directly, no USB CDC flag needed
    -I include
    -I src
    ; Set data cache line size to 64 bytes for reduced RGB display lag/flicker
    -DCONFIG_ESP32S3_DATA_CACHE_LINE_64B=1
    ; Set PSRAM to maximum speed (120MHz OPI) for better bandwidth
    -DCONFIG_SPIRAM_SPEED_120M=1
    ; CRITICAL: Restart DMA transmission in VSYNC to prevent permanent desync
    -DCONFIG_LCD_RGB_RESTART_IN_VSYNC=1
    ; Disable BLE to reduce binary size and avoid missing BLEDevice.h
    -DCONFIG_BTDM_CTRL_MODE_BLE_ONLY=0
    -DHAVE_BLEDEVICE=0
    ; Enable PSRAM for malloc/heap allocation
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Redirect malloc() requests >4KB to PSRAM automatically.
    ; Lowers the threshold from 16KB to 4KB so TCP socket buffers (~5760B),
    ; WebSocket buffers (~22KB), and other mid-size allocations all go to
    ; PSRAM instead of consuming internal RAM.
    ; SDMMC/DMA allocations use heap_caps_malloc(MALLOC_CAP_INTERNAL|DMA)
    ; explicitly so they bypass this threshold and are unaffected.
    -DCONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
    ; Redirect mbedTLS internal allocator to PSRAM for large blocks.
    ; esp_mbedtls_mem_calloc is called by ALL internal mbedTLS code via
    ; MBEDTLS_PLATFORM_CALLOC_MACRO — wrapping it at link time (even in the
    ; pre-compiled libmbedcrypto.a) redirects the 2x16KB SSL record buffers
    ; to PSRAM, fixing MBEDTLS_ERR_SSL_ALLOC_FAILED with only ~30KB iRAM free.
    -Wl,--wrap=esp_mbedtls_mem_calloc
    -Wl,--wrap=esp_mbedtls_mem_free

; Memory Configuration - CRITICAL: Board has 8MB OPI PSRAM, must enable it
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = dio  
board_build.psram_type = opi
board_upload.flash_size = 16MB
#board_build.partitions = partitions.csv
; Use custom partitions that explicitly fit a 16MB flash
board_build.partitions = partitions.csv
board_upload.offset_address = 0x100000
board_build.filesystem = spiffs

lib_deps =
    lvgl/lvgl@^8.3.0
    bblanchon/ArduinoJson
    Links2004/WebSockets
    knolleary/PubSubClient@^2.8
lib_ignore =
    ; Ignore BLE-related libraries since BLE is disabled
    ESP32 BLE Arduino
    NimBLE-Arduino
